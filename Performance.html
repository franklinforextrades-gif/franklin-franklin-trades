<!DOCTYPE html>
<html>
<head>
<title>Performance - Franklin Forex Trades</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
}

nav h2{
  color:#00ffd5;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-size:15px;
}

nav a:hover{
  color:#00ffd5;
}

/* PERFORMANCE SECTION */
.performance{
  padding:40px;
}

.performance h2{
  color:#00ffd5;
  margin-bottom:20px;
}

/* BAR CHART */
.bar-chart{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.bar-container{
  display:flex;
  align-items:center;
  gap:10px;
}

.bar-label{
  width:120px;
}

.bar{
  flex:1;
  height:25px;
  background:rgba(0,255,204,0.3);
  border-radius:5px;
  position:relative;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  background:linear-gradient(90deg, #00ffcc, #00ccff);
  text-align:right;
  padding-right:5px;
  line-height:25px;
  color:black;
  font-weight:bold;
  border-radius:5px;
}

/* RECENT ACTIVITY */
.recent-activity{
  margin-top:50px;
}

.recent-activity h3{
  color:#00ffd5;
  margin-bottom:15px;
}

.recent-activity ul{
  list-style:none;
  padding-left:0;
}

.recent-activity li{
  background:rgba(255,255,255,0.05);
  padding:10px 15px;
  margin-bottom:8px;
  border-radius:10px;
}

footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <h2>Franklin Forex Trades</h2>
  
  <div class="dropdown">
    <!-- Hamburger menu icon -->
    <button class="dropbtn">&#9776;</button> <!-- 3-line menu icon -->

    <div class="dropdown-content">
      <a href="index.html">
        <span style="font-size:18px; margin-right:10px;">🏠</span> Home
      </a>
      <a href="dashboard.html">
        <span style="font-size:18px; margin-right:10px;">📊</span> Dashboard
      </a>
      <a href="performance.html">
        <span style="font-size:18px; margin-right:10px;">📈</span> Performance
      </a>
      <a href="copy.html">
        <span style="font-size:18px; margin-right:10px;">🤖</span> Copy Trading
      </a>
    </div>
  </div>
</nav>

<style>
/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  position:sticky;
  top:0;
  z-index:100;
}

nav h2{
  color:#00ffd5;
  margin:0;
}

/* Dropdown */
.dropdown{
  position: relative;
  display: inline-block;
}

.dropbtn{
  background: none;
  border: none;
  color:white;
  font-size:24px; /* bigger for hamburger icon */
  cursor:pointer;
  padding:8px 12px;
}

.dropbtn:hover{
  color:#00ffd5;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background-color:rgba(0,0,0,0.95);
  min-width:180px;
  border-radius:10px;
  box-shadow:0px 8px 16px 0px rgba(0,0,0,0.3);
  overflow:hidden;
}

.dropdown-content a{
  display:flex;
  align-items:center;
  padding:12px 16px;
  text-decoration:none;
  color:white;
  border-bottom:1px solid rgba(0,255,204,0.2);
  font-size:16px;
  transition:0.3s;
}

.dropdown-content a:last-child{
  border-bottom:none;
}

.dropdown-content a:hover{
  background:rgba(0,255,204,0.2);
  color:#00ffd5;
}

.dropdown:hover .dropdown-content{
  display:block;
}
</style>
<section class="performance">
  <h2>Account Performance</h2>

  <!-- Bar chart -->
  <div class="bar-chart" id="bar-chart">
    <!-- Bars will be generated by JS -->
  </div>

  <!-- Recent Activity -->
  <section class="recent-activity">
    <h3>Recent Activity</h3>
    <ul id="recent-activity">
      <!-- Activity items will appear here -->
    </ul>
  </section>
</section>

<footer>
  © 2026 Franklin Forex Trades
</footer>

<script>
// Sample performance data
let performanceData = [
  {name:"XAUUSD", value:75},
  {name:"EURUSD", value:60},
  {name:"GBPUSD", value:50},
  {name:"USDJPY", value:40},
  {name:"XAGUSD", value:30}
];

// Generate bar chart
function renderBars(){
  const container = document.getElementById('bar-chart');
  container.innerHTML = '';
  performanceData.forEach(item=>{
    const barContainer = document.createElement('div');
    barContainer.className = 'bar-container';
    
    const label = document.createElement('div');
    label.className = 'bar-label';
    label.textContent = item.name;
    
    const bar = document.createElement('div');
    bar.className = 'bar';
    
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = item.value + '%';
    fill.textContent = item.value + '%';
    
    bar.appendChild(fill);
    barContainer.appendChild(label);
    barContainer.appendChild(bar);
    container.appendChild(barContainer);
  });
}

// Simulate recent activity
let recentActivity = [
  'XAUUSD +$120',
  'EURUSD -$50',
  'GBPUSD +$80'
];

function renderActivity(){
  const list = document.getElementById('recent-activity');
  list.innerHTML = '';
  recentActivity.forEach(act=>{
    const li = document.createElement('li');
    li.textContent = act;
    list.appendChild(li);
  });
}

// Initial render
renderBars();
renderActivity();

// Optional: simulate updates (every 5 hours, here demo every 15s)
setInterval(()=>{
  // Randomly adjust bar values +/- 5%
  performanceData.forEach(item=>{
    const change = Math.floor(Math.random()*10 -5); // -5 to +5
    item.value = Math.max(0, Math.min(100, item.value + change));
  });

  // Update bars
  renderBars();

  // Simulate new recent activity
  const symbols = ["XAUUSD","EURUSD","GBPUSD","USDJPY","XAGUSD"];
  const symbol = symbols[Math.floor(Math.random()*symbols.length)];
  const profit = Math.floor(Math.random()*150 - 50); // -50 to +100
  recentActivity.unshift(symbol + (profit>=0? ' +':' ') + '$' + profit);
  if(recentActivity.length>9) recentActivity = recentActivity.slice(0,9);
  renderActivity();
},15000);

</script>

</body>
</html>
