<style>
/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  position:sticky;
  top:0;
  z-index:100;
}

nav h2{
  color:#00ffd5;
  margin:0;
}

/* Dropdown */
.dropdown{
  position: relative;
  display: inline-block;
}

.dropbtn{
  background: none;
  border: none;
  color:white;
  font-size:24px; /* bigger for hamburger icon */
  cursor:pointer;
  padding:8px 12px;
}

.dropbtn:hover{
  color:#00ffd5;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background-color:rgba(0,0,0,0.95);
  min-width:180px;
  border-radius:10px;
  box-shadow:0px 8px 16px 0px rgba(0,0,0,0.3);
  overflow:hidden;
}

.dropdown-content a{
  display:flex;
  align-items:center;
  padding:12px 16px;
  text-decoration:none;
  color:white;
  border-bottom:1px solid rgba(0,255,204,0.2);
  font-size:16px;
  transition:0.3s;
}

.dropdown-content a:last-child{
  border-bottom:none;
}

.dropdown-content a:hover{
  background:rgba(0,255,204,0.2);
  color:#00ffd5;
}

.dropdown:hover .dropdown-content{
  display:block;
}
</style>
